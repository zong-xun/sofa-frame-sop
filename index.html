<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>沙發木架 SOP 看板</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- 側欄（桌機） -->
  <aside class="rail">
    <div class="logo"><div class="mark">木</div><div><h1>沙發木架 SOP 看板</h1><small>WORKSHOP</small></div></div>
    <button class="navitem on" data-nav="sop"><span class="ic">📋</span> 型號 SOP</button>
    <button class="navitem" data-nav="find"><span class="ic">🔍</span> 找料位置</button>
    <button class="navitem" data-nav="guide"><span class="ic">📐</span> 圖例規範</button>
    <div class="spacer"></div>
    <div class="foot">內部使用・觸控／滑鼠皆可<br>內容自行維護</div>
  </aside>

  <div class="stageWrap">
    <div class="appbar">
      <div id="ctx"><h2 id="ctxTitle">型號 SOP</h2><div class="sub" id="ctxSub">選型號 → 查用料 → 看完成樣 → 開始組裝</div></div>
      <div class="grow"></div>
      <label class="search" id="sopSearch">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C756B" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="q" type="search" placeholder="搜尋型號…" autocomplete="off">
      </label>
      <label class="search" id="findSearch" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7C756B" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="fq" type="search" placeholder="搜尋代號或料名…" autocomplete="off">
      </label>
    </div>

    <!-- ===== SOP ===== -->
    <section id="view-sop" class="view on">

      <div id="sopList" class="scroll on"><div id="grid" class="grid"></div></div>

      <div id="overview" class="scroll">
        <div class="ov">
          <div class="ovhead">
            <button class="icon-btn" id="backToList" aria-label="回列表">‹</button>
            <div><div class="code" id="ovCode"></div><div class="type" id="ovType"></div></div>
          </div>
          <div class="ovtitle">用料清單 · 開工前先備齊</div>
          <div class="ovsub">逐項核對，每張料件都可以點一下跳到「找料位置」看在倉庫哪一區。</div>
          <div id="ovList" class="bomgrid"></div>
          <button class="startbtn" id="startDoneBtn">看完成樣 ›</button>
        </div>
      </div>

      <div id="done" class="scroll">
        <div class="ov">
          <div class="ovhead">
            <button class="icon-btn" id="backToOverviewFromDone" aria-label="回用料清單">‹</button>
            <div><div class="code" id="dnCode"></div><div class="type" id="dnType"></div></div>
          </div>
          <div class="ovtitle">完成樣 · 組好長這樣</div>
          <div class="ovsub">先看過整體樣子，再開始一步步組裝。</div>
          <div class="doneimg" id="dnImg"></div>
          <button class="startbtn" id="startAssemblyBtn">開始組裝 ›</button>
        </div>
      </div>

      <div id="reader" class="reader">
        <div class="rhead">
          <button class="icon-btn" id="backToOverviewFromReader" aria-label="回用料清單">‹</button>
          <div><div class="code" id="rCode"></div><div class="type" id="rType"></div></div>
          <div class="grow"></div>
          <button class="vbtn" id="vbtn" hidden>▶ 看示範</button>
        </div>
        <div class="ruler"><span class="cnt" id="rCnt"></span><div class="track"><div class="fill" id="rFill"></div></div></div>
        <div class="rbody">
          <div class="media">
            <span class="demo" id="rDemo">示意圖</span>
            <div class="zoom-ctrl">
              <button type="button" id="zoomOut" aria-label="縮小">−</button>
              <button type="button" id="zoomReset" aria-label="還原大小">100%</button>
              <button type="button" id="zoomIn" aria-label="放大">＋</button>
            </div>
            <div class="inner" id="rMedia"></div>
          </div>
          <div class="info" id="rInfo"></div>
        </div>
        <div class="rfoot">
          <div class="rail-steps" id="rRail"></div>
          <div class="actions">
            <button class="act" id="rPrev">‹ 上一步</button>
            <button class="act primary" id="rNext">下一步 ›</button>
          </div>
        </div>
      </div>

      <div class="mbackdrop" id="locBackdrop"></div>
      <div class="locsheet" id="locSheet">
        <div class="grab"></div>
        <button class="dclose" id="locClose" aria-label="關閉">✕</button>
        <div id="locBody"></div>
      </div>
    </section>

    <!-- ===== 找料位置 ===== -->
    <section id="view-find" class="view">
      <div class="backdrop" id="findBackdrop"></div>
      <div class="find">
        <div class="board">
          <div class="bh">🗺 倉庫示意地圖 <span class="hint">點色塊篩選材料</span></div>
          <div class="map" id="map"></div>
        </div>
        <div class="board detailboard">
          <div class="bh">材料清單 <span class="hint" id="cnt"></span></div>
          <div class="listwrap">
            <div class="sheet-detail" id="detail"></div>
            <div id="list"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 圖例規範 ===== -->
    <section id="view-guide" class="view">
      <div class="scroll"><div class="guide">
        <h3>圖例規範</h3>
        <p class="gsub">同一套標示放上去，就有說明書的感覺。全工廠用同一套符號，新人一看就懂。</p>
        <div class="ggrid"><div class="geg" id="geg"></div><div id="ruleList"></div></div>
        <div class="gtip">💡 之後有真實照片，直接在 js/data.js 該步驟加上 img／done 路徑就會換成照片；沒有照片時就顯示自動示意圖，符號規則一樣。</div>
      </div></div>
    </section>
  </div>

  <!-- 底部分頁列（手機） -->
  <nav class="tabbar">
    <button class="tb on" data-nav="sop"><span class="ic">📋</span>型號</button>
    <button class="tb" data-nav="find"><span class="ic">🔍</span>找料</button>
    <button class="tb" data-nav="guide"><span class="ic">📐</span>規範</button>
  </nav>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
